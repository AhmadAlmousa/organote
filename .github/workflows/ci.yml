name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.0
          channel: stable
          cache: true

      # .env is a declared Flutter asset but gitignored; materialize it from
      # the example until the build is decoupled from it (audit task 2.3).
      - name: Materialize .env from example
        run: cp .env.example .env

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test
